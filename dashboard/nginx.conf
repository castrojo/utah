server {
    listen 8091;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Prometheus proxy (kills CORS) ─────────────────────────────────────────
    # Dashboard hits /api/prometheus/... which proxies to localhost:9090
    location /api/prometheus/ {
        proxy_pass         http://127.0.0.1:9090/;
        proxy_http_version 1.1;
        proxy_set_header   Host localhost;
        proxy_set_header   X-Real-IP $remote_addr;
        # No CORS headers needed — same-origin from dashboard perspective
    }

    # ── Ghost-lab API proxy (optional, for future expansion) ─────────────────
    location /api/ghostlab/ {
        proxy_pass         http://127.0.0.1:9000/;
        proxy_http_version 1.1;
        proxy_set_header   Host localhost;
    }

    # ── Static files ──────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ =404;
    }

    # Cache-control: no-cache for stats.json (regenerated at deploy time)
    location = /stats.json {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        try_files $uri =404;
    }

    # Gzip static assets
    gzip on;
    gzip_types text/html text/css application/javascript application/json;
}
