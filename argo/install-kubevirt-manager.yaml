apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: install-kubevirt-manager
  namespace: argo
spec:
  entrypoint: install
  templates:
    - name: install
      script:
        image: bitnami/kubectl:latest
        command: [bash]
        source: |
          set -euo pipefail
          echo "→ Installing KubeVirt Manager..."
          kubectl apply -f https://raw.githubusercontent.com/kubevirt-manager/kubevirt-manager/main/kubernetes/bundled.yaml
          kubectl -n kubevirt-manager wait deploy/kubevirt-manager --for=condition=Available --timeout=120s
          kubectl -n kubevirt-manager patch svc kubevirt-manager \
            --type=merge \
            --patch '{"spec":{"type":"NodePort","ports":[{"port":8080,"nodePort":30180}]}}'
          echo "✓ KubeVirt Manager ready at :30180"
