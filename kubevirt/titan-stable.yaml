apiVersion: cdi.kubevirt.io/v1beta1
kind: DataVolume
metadata:
  name: titan-stable-disk
  namespace: default
spec:
  source:
    registry:
      url: "docker://ghcr.io/ublue-os/bluefin:stable"
      pullMethod: node
  pvc:
    accessModes: [ReadWriteOnce]
    resources:
      requests:
        storage: 50Gi
---
apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: titan-stable
  namespace: default
  labels:
    titan: "true"
    variant: stable
spec:
  runStrategy: Manual
  template:
    spec:
      domain:
        cpu:
          cores: 8
          sockets: 1
          threads: 1
        memory:
          guest: 8Gi
        devices:
          autoattachGraphicsDevice: true
          disks:
            - name: rootdisk
              disk:
                bus: virtio
          interfaces:
            - name: default
              masquerade: {}
      networks:
        - name: default
          pod: {}
      volumes:
        - name: rootdisk
          dataVolume:
            name: titan-stable-disk
