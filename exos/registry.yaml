# Bluespeed Exo Robot Army Registry
# Each entry is a registered contributor node in the fleet.
# callsign:       machine identifier (prefix)
# number:         machine index in this callsign group
# role:           node function in the fleet
# prometheus_host: host_name label in Prometheus (OTel) — used for online/offline
# k3s_node:       kubectl node name — used for cluster status
# description:    human-readable description
# registered:     ISO date added to fleet

